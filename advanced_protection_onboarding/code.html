<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Finance Guard - Advanced Protection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(45, 52, 73, 0.6);
        backdrop-filter: blur(20px);
      }
      .security-pulse {
        box-shadow: 0 0 15px rgba(74, 225, 118, 0.4);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 shadow-blue-500/10 shadow-2xl backdrop-blur-xl">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-400 dark:text-blue-400" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="text-lg font-bold tracking-tight text-slate-100 dark:text-slate-100 font-headline">AI Finance Guard</span>
</div>
<button class="text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all px-4 py-1.5 rounded-full text-sm font-medium">Skip</button>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-32">
<!-- Security Pulse Component -->
<div class="absolute top-28 flex items-center gap-2 px-4 py-2 glass-card rounded-full border border-white/5 security-pulse">
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
<span class="text-[10px] uppercase tracking-widest font-bold text-secondary">AI Sentinel Active</span>
</div>
<!-- Central 3D Visual Section -->
<div class="relative w-full max-w-md flex flex-col items-center justify-center">
<!-- Background Aura Glow -->
<div class="absolute w-64 h-64 bg-primary/20 rounded-full blur-[100px] -z-10"></div>
<div class="relative mb-12">
<!-- Main Shield Visual -->
<div class="w-56 h-56 bg-gradient-to-br from-surface-container-high to-surface-container-lowest rounded-xl flex items-center justify-center shadow-2xl relative overflow-hidden group">
<!-- Glass Layers for depth -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent opacity-50"></div>
<div class="absolute -inset-4 bg-primary/5 blur-xl group-hover:bg-primary/10 transition-colors"></div>
<!-- Shield Icon -->
<span class="material-symbols-outlined text-[100px] text-primary relative z-10 drop-shadow-2xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<!-- AI Scanning Indicators -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-0.5 bg-primary/30 blur-sm absolute top-1/2 -translate-y-1/2"></div>
<div class="h-full w-0.5 bg-primary/30 blur-sm absolute left-1/2 -translate-x-1/2"></div>
</div>
</div>
<!-- Floating Data Chips -->
<div class="absolute -top-4 -right-8 glass-card p-3 rounded-lg border border-white/5 shadow-xl rotate-6">
<span class="material-symbols-outlined text-secondary text-sm">sms</span>
<div class="h-1 w-8 bg-on-surface-variant/20 mt-1 rounded-full"></div>
</div>
<div class="absolute -bottom-4 -left-8 glass-card p-3 rounded-lg border border-white/5 shadow-xl -rotate-12">
<span class="material-symbols-outlined text-primary text-sm">call</span>
<div class="h-1 w-12 bg-on-surface-variant/20 mt-1 rounded-full"></div>
</div>
</div>
<!-- Content Area -->
<div class="text-center space-y-4 max-w-sm">
<h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight text-on-surface">
                    Advanced Protection
                </h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed">
                    Our AI scans every SMS and call to detect sophisticated fraud patterns before they reach you.
                </p>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-6 pb-12 pt-8 flex flex-col items-center gap-8 bg-gradient-to-t from-surface to-transparent">
<!-- Pagination Dots -->
<div class="fixed bottom-12 left-0 w-full z-50 flex justify-center items-center gap-3">
<span class="material-symbols-outlined text-blue-400 scale-125 drop-shadow-[0_0_8px_rgba(59,130,246,0.6)]" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span class="material-symbols-outlined text-slate-700 opacity-40 hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span class="material-symbols-outlined text-slate-700 opacity-40 hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span class="material-symbols-outlined text-slate-700 opacity-40 hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</div>
<!-- Primary Action -->
<div class="w-full max-w-md">
<button class="w-full py-5 rounded-lg bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg shadow-lg shadow-primary/10 hover:scale-[0.98] transition-all duration-300">
                Next
            </button>
</div>
</footer>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none -z-20">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
